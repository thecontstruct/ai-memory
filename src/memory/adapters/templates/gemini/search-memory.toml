description = "Search ai-memory for past decisions, patterns, conventions, and error fixes"
prompt = """Search the ai-memory vector database for relevant memories.

Query: {{args}}

Run this command to search (do not modify the path or arguments):

```shell
"$AI_MEMORY_INSTALL_DIR/.venv/bin/python" "$AI_MEMORY_INSTALL_DIR/src/memory/search_cli.py" --query "{{args}}" --project "$AI_MEMORY_PROJECT_ID"
```

Present the results to the user organized by relevance, with source collection and confidence score for each result."""
