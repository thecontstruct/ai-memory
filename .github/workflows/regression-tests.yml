name: Regression Tests

# =============================================================================
# PR REGRESSION TESTS (Secret-Gated)
# =============================================================================
# This workflow triggers on PRs and uses a secret-gated `if:` condition.
# When secrets are unavailable (fork PRs), the regression tests SKIP silently.
# This is intentional per BP-149 — we cannot run tests requiring live services
# without credentials, and we cannot expose secrets to fork PRs.
#
# REGRESSION COVERAGE is provided by regression-nightly.yml which runs:
#   - On schedule (daily 6am UTC)
#   - On push to main (post-merge)
# Both contexts have secrets available, so regression tests run unconditionally.
#
# See TD-397 and BP-149 for context.
# =============================================================================

# Triggers on PRs to main/develop when memory code or hook scripts change.
# Blocks merge if any regression test fails — scores must meet quality thresholds.
# ZERO hardcoded secrets — all credentials come from GitHub repository secrets.

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "src/memory/**"
      - ".claude/hooks/scripts/**"

concurrency:
  group: regression-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ============================================================================
  # REGRESSION TESTS - Live Langfuse + Qdrant required
  # ============================================================================
  regression-tests:
    name: Regression Tests (PLAN-012)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      QDRANT_URL: ${{ secrets.QDRANT_URL }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run regression test suite
        # Skipped when Langfuse/Qdrant secrets are absent (e.g., fork PRs).
        # When this step RUNS, failures are real and BLOCK the merge.
        if: env.LANGFUSE_PUBLIC_KEY != '' && env.QDRANT_URL != ''
        run: |
          pytest tests/test_regression.py -v --tb=short -m regression
        env:
          LANGFUSE_ENABLED: "true"
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASE_URL: ${{ secrets.LANGFUSE_BASE_URL }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}

      - name: Run evaluations dry-run (quality gate check)
        # Skipped when Langfuse/Qdrant secrets are absent (e.g., fork PRs).
        # When this step RUNS, failures are real and BLOCK the merge.
        if: env.LANGFUSE_PUBLIC_KEY != '' && env.QDRANT_URL != ''
        run: |
          python scripts/run_evaluations.py \
            --config evaluator_config.yaml \
            --since "24h" \
            --dry-run
        env:
          LANGFUSE_ENABLED: "true"
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASE_URL: ${{ secrets.LANGFUSE_BASE_URL }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}

      - name: Upload regression results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: regression-results-${{ github.run_id }}
          path: |
            .audit/logs/evaluations.jsonl
          retention-days: 90
          if-no-files-found: ignore
