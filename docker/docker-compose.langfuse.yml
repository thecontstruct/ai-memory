name: ai-memory
# docker-compose.langfuse.yml — Langfuse LLM Observability Stack
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.langfuse.yml --profile langfuse up -d
#
# All services use profile "langfuse" — opt-in, not started by default.
# Joins the existing ai-memory_default network (external: true).

x-ai-memory-labels-langfuse: &ai-memory-labels-langfuse
  ai-memory.managed: "true"
  ai-memory.wipe-policy: "exclude"
  ai-memory.stack: "langfuse"
  org.opencontainers.image.vendor: "ai-memory"

services:

  # ─── Langfuse Web UI ───────────────────────────────────────────────────────
  langfuse-web:
    image: docker.io/langfuse/langfuse:3
    container_name: ${AI_MEMORY_CONTAINER_PREFIX:-ai-memory}-langfuse-web
    labels:
      <<: *ai-memory-labels-langfuse
      ai-memory.service: "langfuse-web"
    profiles: ["langfuse"]
    ports:
      - "127.0.0.1:${LANGFUSE_WEB_PORT:-23100}:3000"
    environment:
      # Next.js must bind to all interfaces for healthcheck and port forwarding (BUG-136)
      - HOSTNAME=0.0.0.0
      # Database
      - DATABASE_URL=postgresql://langfuse:${LANGFUSE_DB_PASSWORD}@langfuse-postgres:5432/langfuse
      # NextAuth
      - NEXTAUTH_SECRET=${LANGFUSE_NEXTAUTH_SECRET}
      - NEXTAUTH_URL=http://localhost:${LANGFUSE_WEB_PORT:-23100}
      - SALT=${LANGFUSE_SALT}
      - ENCRYPTION_KEY=${LANGFUSE_ENCRYPTION_KEY}
      # ClickHouse (internal service names for container-to-container communication)
      - CLICKHOUSE_MIGRATION_URL=clickhouse://default:${LANGFUSE_CLICKHOUSE_PASSWORD}@langfuse-clickhouse:9000
      - CLICKHOUSE_URL=http://langfuse-clickhouse:8123
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${LANGFUSE_CLICKHOUSE_PASSWORD}
      # Single-node ClickHouse — disable clustering to avoid ReplicatedMergeTree
      # requiring Zookeeper/Keeper (BUG-135, per Langfuse self-hosting docs)
      - CLICKHOUSE_CLUSTER_ENABLED=false
      # Redis
      - REDIS_CONNECTION_STRING=redis://langfuse-redis:6379
      # MinIO / S3 event upload
      - LANGFUSE_S3_EVENT_UPLOAD_ENABLED=true
      - LANGFUSE_S3_EVENT_UPLOAD_BUCKET=langfuse
      - LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID=${LANGFUSE_S3_ACCESS_KEY}
      - LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY=${LANGFUSE_S3_SECRET_KEY}
      - LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT=http://langfuse-minio:9000
      - LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE=true
      - LANGFUSE_S3_EVENT_UPLOAD_REGION=us-east-1
      # Langfuse v3 headless auto-initialization (first-start bootstrap)
      - LANGFUSE_INIT_ORG_ID=${LANGFUSE_INIT_ORG_ID:-}
      - LANGFUSE_INIT_ORG_NAME=${LANGFUSE_INIT_ORG_NAME:-}
      - LANGFUSE_INIT_PROJECT_ID=${LANGFUSE_INIT_PROJECT_ID:-}
      - LANGFUSE_INIT_PROJECT_NAME=${LANGFUSE_INIT_PROJECT_NAME:-}
      - LANGFUSE_INIT_PROJECT_PUBLIC_KEY=${LANGFUSE_INIT_PROJECT_PUBLIC_KEY:-}
      - LANGFUSE_INIT_PROJECT_SECRET_KEY=${LANGFUSE_INIT_PROJECT_SECRET_KEY:-}
      - LANGFUSE_INIT_USER_EMAIL=${LANGFUSE_INIT_USER_EMAIL:-}
      - LANGFUSE_INIT_USER_NAME=${LANGFUSE_INIT_USER_NAME:-}
      - LANGFUSE_INIT_USER_PASSWORD=${LANGFUSE_INIT_USER_PASSWORD:-}
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-minio:
        condition: service_started
      langfuse-minio-init:
        condition: service_completed_successfully
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - ai-memory_default
    healthcheck:
      # Use 127.0.0.1 not localhost — Alpine BusyBox wget resolves localhost to
      # IPv6 ::1 first, but Node.js only listens on IPv4 0.0.0.0 (BUG-136)
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:3000/api/public/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s  # Migrations run on first start — allow extra time

  # ─── Langfuse Worker ───────────────────────────────────────────────────────
  langfuse-worker:
    image: docker.io/langfuse/langfuse-worker:3
    container_name: ${AI_MEMORY_CONTAINER_PREFIX:-ai-memory}-langfuse-worker
    labels:
      <<: *ai-memory-labels-langfuse
      ai-memory.service: "langfuse-worker"
    profiles: ["langfuse"]
    ports:
      - "127.0.0.1:${LANGFUSE_WORKER_PORT:-23130}:3030"
    environment:
      # Node.js must bind to all interfaces for healthcheck (BUG-136)
      - HOSTNAME=0.0.0.0
      # Shared config with langfuse-web
      - DATABASE_URL=postgresql://langfuse:${LANGFUSE_DB_PASSWORD}@langfuse-postgres:5432/langfuse
      - NEXTAUTH_SECRET=${LANGFUSE_NEXTAUTH_SECRET}
      - NEXTAUTH_URL=http://localhost:${LANGFUSE_WEB_PORT:-23100}
      - SALT=${LANGFUSE_SALT}
      - ENCRYPTION_KEY=${LANGFUSE_ENCRYPTION_KEY}
      - CLICKHOUSE_MIGRATION_URL=clickhouse://default:${LANGFUSE_CLICKHOUSE_PASSWORD}@langfuse-clickhouse:9000
      - CLICKHOUSE_URL=http://langfuse-clickhouse:8123
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${LANGFUSE_CLICKHOUSE_PASSWORD}
      # Single-node ClickHouse — disable clustering (BUG-135)
      - CLICKHOUSE_CLUSTER_ENABLED=false
      - REDIS_CONNECTION_STRING=redis://langfuse-redis:6379
      - LANGFUSE_S3_EVENT_UPLOAD_ENABLED=true
      - LANGFUSE_S3_EVENT_UPLOAD_BUCKET=langfuse
      - LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID=${LANGFUSE_S3_ACCESS_KEY}
      - LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY=${LANGFUSE_S3_SECRET_KEY}
      - LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT=http://langfuse-minio:9000
      - LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE=true
      - LANGFUSE_S3_EVENT_UPLOAD_REGION=us-east-1
      # Langfuse v3 headless auto-initialization (first-start bootstrap)
      - LANGFUSE_INIT_ORG_ID=${LANGFUSE_INIT_ORG_ID:-}
      - LANGFUSE_INIT_ORG_NAME=${LANGFUSE_INIT_ORG_NAME:-}
      - LANGFUSE_INIT_PROJECT_ID=${LANGFUSE_INIT_PROJECT_ID:-}
      - LANGFUSE_INIT_PROJECT_NAME=${LANGFUSE_INIT_PROJECT_NAME:-}
      - LANGFUSE_INIT_PROJECT_PUBLIC_KEY=${LANGFUSE_INIT_PROJECT_PUBLIC_KEY:-}
      - LANGFUSE_INIT_PROJECT_SECRET_KEY=${LANGFUSE_INIT_PROJECT_SECRET_KEY:-}
      - LANGFUSE_INIT_USER_EMAIL=${LANGFUSE_INIT_USER_EMAIL:-}
      - LANGFUSE_INIT_USER_NAME=${LANGFUSE_INIT_USER_NAME:-}
      - LANGFUSE_INIT_USER_PASSWORD=${LANGFUSE_INIT_USER_PASSWORD:-}
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-minio:
        condition: service_started
      langfuse-minio-init:
        condition: service_completed_successfully
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - ai-memory_default
    healthcheck:
      # Use 127.0.0.1 not localhost — same IPv6 issue as langfuse-web (BUG-136)
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3030/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── PostgreSQL (Langfuse metadata store) ──────────────────────────────────
  langfuse-postgres:
    image: docker.io/postgres:17
    container_name: ${AI_MEMORY_CONTAINER_PREFIX:-ai-memory}-langfuse-postgres
    labels:
      <<: *ai-memory-labels-langfuse
      ai-memory.service: "langfuse-postgres"
    profiles: ["langfuse"]
    ports:
      - "127.0.0.1:${LANGFUSE_POSTGRES_PORT:-25432}:5432"
    volumes:
      - langfuse-postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=${LANGFUSE_DB_PASSWORD}
      - POSTGRES_DB=langfuse
    restart: unless-stopped
    # NOTE: No cap_drop/no-new-privileges — Postgres requires CHOWN/SETUID/SETGID
    # to switch from root to postgres user on startup (BUG-134).
    networks:
      - ai-memory_default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── ClickHouse (trace + observation storage) ──────────────────────────────
  langfuse-clickhouse:
    image: docker.io/clickhouse/clickhouse-server:24
    container_name: ${AI_MEMORY_CONTAINER_PREFIX:-ai-memory}-langfuse-clickhouse
    labels:
      <<: *ai-memory-labels-langfuse
      ai-memory.service: "langfuse-clickhouse"
    profiles: ["langfuse"]
    ports:
      - "127.0.0.1:${LANGFUSE_CLICKHOUSE_PORT:-28123}:8123"
    volumes:
      - langfuse-clickhouse-data:/var/lib/clickhouse
      - ./langfuse/clickhouse-config.xml:/etc/clickhouse-server/config.d/retention.xml:ro
    environment:
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${LANGFUSE_CLICKHOUSE_PASSWORD}
    restart: unless-stopped
    # NOTE: No cap_drop/no-new-privileges — ClickHouse requires privilege
    # escalation for user switching and data directory ownership (BUG-134).
    networks:
      - ai-memory_default
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Redis (queue / ephemeral cache) ───────────────────────────────────────
  # No persistent volume — queue durability is provided by ClickHouse
  langfuse-redis:
    image: docker.io/redis:7
    container_name: ${AI_MEMORY_CONTAINER_PREFIX:-ai-memory}-langfuse-redis
    labels:
      <<: *ai-memory-labels-langfuse
      ai-memory.service: "langfuse-redis"
    profiles: ["langfuse"]
    ports:
      - "127.0.0.1:${LANGFUSE_REDIS_PORT:-26379}:6379"
    restart: unless-stopped
    # NOTE: No cap_drop/no-new-privileges — Redis needs SETUID/SETGID
    # to switch to redis user on startup (BUG-134).
    networks:
      - ai-memory_default
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── MinIO (S3-compatible blob storage for event upload) ───────────────────
  # Image: Chainguard hardened distroless — no mc CLI available.
  # Health check uses wget HTTP against the MinIO liveness endpoint.
  langfuse-minio:
    image: cgr.dev/chainguard/minio
    container_name: ${AI_MEMORY_CONTAINER_PREFIX:-ai-memory}-langfuse-minio
    labels:
      <<: *ai-memory-labels-langfuse
      ai-memory.service: "langfuse-minio"
    profiles: ["langfuse"]
    ports:
      - "127.0.0.1:${LANGFUSE_MINIO_PORT:-29000}:9000"
    volumes:
      - langfuse-minio-data:/data
    command: server /data
    environment:
      - MINIO_ROOT_USER=${LANGFUSE_S3_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${LANGFUSE_S3_SECRET_KEY}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - ai-memory_default
    healthcheck:
      # Chainguard distroless image has no wget/curl — use bash TCP probe (BUG-139)
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/9000'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── MinIO Init (bucket creation) ────────────────────────────────────────────
  # BUG-263: Chainguard distroless MinIO image has no mc CLI — cannot create bucket.
  # Use minio/mc init container to create the 'langfuse' bucket after MinIO is healthy.
  # restart: "no" ensures this only runs once (one-shot init pattern).
  langfuse-minio-init:
    image: minio/mc
    container_name: ${AI_MEMORY_CONTAINER_PREFIX:-ai-memory}-langfuse-minio-init
    labels:
      <<: *ai-memory-labels-langfuse
      ai-memory.service: "langfuse-minio-init"
    profiles: ["langfuse"]
    depends_on:
      langfuse-minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://langfuse-minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/langfuse &&
        echo "Bucket 'langfuse' ready"
    environment:
      - MINIO_ROOT_USER=${LANGFUSE_S3_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${LANGFUSE_S3_SECRET_KEY}
      - MC_CONFIG_DIR=/tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - ai-memory_default
    restart: "no"

  # ─── Trace Flush Worker (AI Memory component) ──────────────────────────────
  # Reads buffered traces from host trace_buffer/ and flushes them to Langfuse.
  # Runs inside the Langfuse compose because it requires Langfuse to be healthy.
  trace-flush-worker:
    build:
      context: ../
      dockerfile: docker/Dockerfile.worker
    container_name: ${AI_MEMORY_CONTAINER_PREFIX:-ai-memory}-langfuse-trace-flush-worker
    labels:
      <<: *ai-memory-labels-langfuse
      ai-memory.service: "langfuse-trace-flush-worker"
    profiles: ["langfuse"]
    command: python -m memory.trace_flush_worker
    volumes:
      - ${AI_MEMORY_INSTALL_DIR:-~/.ai-memory}/trace_buffer:/app/trace_buffer
    environment:
      # Match volume mount path so BUFFER_DIR resolves to /app/trace_buffer (BUG-138)
      - AI_MEMORY_INSTALL_DIR=/app
      - LANGFUSE_ENABLED=true
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:?Run langfuse_setup.sh first to generate API keys}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:?Run langfuse_setup.sh first to generate API keys}
      # Use internal service name for container-to-container communication
      - LANGFUSE_BASE_URL=http://langfuse-web:3000
      - LANGFUSE_FLUSH_INTERVAL=${LANGFUSE_FLUSH_INTERVAL:-5}
      - PUSHGATEWAY_URL=pushgateway:9091
    depends_on:
      langfuse-web:
        condition: service_healthy
    restart: unless-stopped
    # Run as host user for buffer file permissions (bind mount access)
    user: "${UID:-1000}:${GID:-1000}"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      # File-based heartbeat — worker touches .heartbeat on each flush loop iteration
      # Python check: exit 0 if file modified within last 60s, exit 1 otherwise
      test: ["CMD-SHELL", "python3 -c \"import os,sys,time; f='/app/trace_buffer/.heartbeat'; sys.exit(0 if os.path.exists(f) and time.time()-os.path.getmtime(f)<60 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - ai-memory_default

  # ─── Evaluator Scheduler (AI Memory component) ────────────────────────────
  # Runs LLM-as-Judge evaluation pipeline on a cron schedule.
  # Schedule configured via evaluator_config.yaml (schedule.cron, lookback_hours).
  # Requires Langfuse to be healthy so it can post scores via create_score().
  evaluator-scheduler:
    build:
      context: ../
      dockerfile: docker/Dockerfile.evaluator-scheduler
    container_name: ${AI_MEMORY_CONTAINER_PREFIX:-ai-memory}-evaluator-scheduler
    labels:
      <<: *ai-memory-labels-langfuse
      ai-memory.service: "evaluator-scheduler"
    profiles: ["langfuse"]
    volumes:
      - ../src:/app/src:ro
      - ../scripts:/app/scripts:ro
      - ../evaluators:/app/evaluators:ro
      - ../evaluator_config.yaml:/app/evaluator_config.yaml:ro
      - ${AI_MEMORY_INSTALL_DIR:-.}/.audit:/app/.audit
    environment:
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:?Run langfuse_setup.sh first to generate API keys}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:?Run langfuse_setup.sh first to generate API keys}
      # Use internal service name for container-to-container communication
      - LANGFUSE_BASE_URL=http://langfuse-web:3000
      # Ollama base URL — must use host.docker.internal inside Docker (not localhost)
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      # Optional LLM provider API keys (read from env; not all are required)
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Optional custom LLM provider (provider=custom in evaluator_config.yaml)
      - EVALUATOR_BASE_URL=${EVALUATOR_BASE_URL:-}
      - EVALUATOR_API_KEY=${EVALUATOR_API_KEY:-}
      # NOTE: EVALUATOR_PROVIDER and EVALUATOR_MODEL are NOT set here —
      # they are read from evaluator_config.yaml (evaluator_model section)
      - PYTHONPATH=/app/src
      - AI_MEMORY_LOG_LEVEL=${AI_MEMORY_LOG_LEVEL:-INFO}
    depends_on:
      langfuse-web:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - ai-memory_default
    healthcheck:
      # File-based heartbeat — scheduler touches health file on startup and after each
      # successful evaluation run. Check: file exists AND modified within last 90000s (25h).
      # 25h window accommodates a daily cron + restart without false failure.
      test: ["CMD-SHELL", "python3 -c \"import os,sys,time; f='/tmp/evaluator-scheduler.health'; sys.exit(0 if os.path.exists(f) and time.time()-os.path.getmtime(f)<90000 else 1)\""]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 120s  # TD-345: Was 90000s (25h) — start_period is container startup buffer, not cron window

# ─── Network ─────────────────────────────────────────────────────────────────
# Join the existing ai-memory stack network so Langfuse services can communicate
# with the classifier-worker, embedding service, and other AI Memory components.
networks:
  ai-memory_default:
    external: true

# ─── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  langfuse-postgres-data:
    labels:
      <<: *ai-memory-labels-langfuse
      ai-memory.volume: "langfuse-postgres-data"
  langfuse-clickhouse-data:
    labels:
      <<: *ai-memory-labels-langfuse
      ai-memory.volume: "langfuse-clickhouse-data"
  langfuse-minio-data:
    labels:
      <<: *ai-memory-labels-langfuse
      ai-memory.volume: "langfuse-minio-data"
